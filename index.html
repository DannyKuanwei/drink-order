<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>訂餐小幫手</title>
<style>
  :root { --brand:#7b4b2a; --brand2:#a9743f; --bg:#fbf6ef; --card:#fff; --line:#ece2d5; --ink:#3a2c1e; --muted:#9b8a76; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:"Microsoft JhengHei",system-ui,sans-serif; }
  .wrap { max-width:560px; margin:0 auto; padding:14px 14px 60px; }
  header { text-align:center; padding:14px 0 6px; }
  header h1 { margin:0; font-size:24px; letter-spacing:2px; }
  header .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px; margin-top:14px; box-shadow:0 2px 10px rgba(120,80,40,.05); }
  .card h2 { margin:0 0 12px; font-size:16px; letter-spacing:1px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .lead { margin:0 0 14px; font-size:14px; color:var(--brand); font-weight:800; background:#fbf1e7; border-radius:10px; padding:10px 12px; text-align:center; }
  .muted-note { margin:0 0 2px; font-size:12px; color:var(--muted); line-height:1.6; }
  .notopen { text-align:center; padding:28px 16px; color:var(--ink); font-size:17px; font-weight:800; line-height:1.9; }
  .notopen span { font-size:13px; font-weight:400; color:var(--muted); }
  .teamtag { display:inline-flex; align-items:center; gap:6px; background:#f3ece1; border:1px solid var(--line); border-radius:999px; padding:6px 8px 6px 12px; margin:0 6px 6px 0; font-size:13px; font-weight:700; color:var(--brand); }
  .teamtag .x { border:none; background:#e7d8c6; color:#9a4b35; border-radius:50%; width:20px; height:20px; font-size:13px; cursor:pointer; line-height:1; }
  .teamrow { border:1px solid var(--line); border-radius:12px; padding:11px 12px; margin-bottom:10px; }
  .teamrow .name { font-weight:800; color:var(--brand); margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .teamrow .name .close { border:none; background:transparent; color:#c0563f; font-size:13px; font-weight:700; cursor:pointer; }
  .teamrow .linkrow { display:flex; gap:8px; align-items:center; }
  .teamrow .url { flex:1; min-width:0; font-size:12px; color:var(--muted); background:#faf5ee; border:1px solid var(--line); border-radius:9px; padding:8px 10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .teamrow .copy { flex:none; border:1px solid var(--brand); background:#fff; color:var(--brand); border-radius:9px; width:44px; height:38px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.12s; }
  .teamrow .copy.done { background:var(--brand); color:#fff; }
  label.field { display:block; font-size:12px; color:var(--muted); margin:12px 0 6px; font-weight:700; letter-spacing:1px; }
  input[type=text] { width:100%; padding:12px; border:1px solid var(--line); border-radius:12px; font-size:16px; outline:none; font-family:inherit; }
  input[type=text]:focus { border-color:var(--brand2); }
  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { padding:9px 14px; border-radius:999px; border:1.5px solid var(--line); background:#fff; font-size:14px; cursor:pointer; user-select:none; transition:.12s; font-family:inherit; color:var(--ink); }
  .chip.on { background:var(--brand); border-color:var(--brand); color:#fff; font-weight:700; }
  .shopchips .chip.on { background:var(--brand2); border-color:var(--brand2); }
  .items { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .item { padding:12px; border-radius:14px; border:1.5px solid var(--line); background:#fff; cursor:pointer; text-align:left; transition:.12s; font-family:inherit; }
  .item.on { border-color:var(--brand); background:#fbf1e7; }
  .item .nm { font-size:15px; font-weight:700; color:var(--ink); }
  .item .pr { font-size:12px; color:var(--muted); margin-top:3px; }
  .dice { margin-top:10px; width:100%; padding:12px; border:1.5px dashed var(--brand2); background:#fff7ef; color:var(--brand); border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:.12s; }
  .dice:active:not(:disabled) { transform:scale(.98); }
  .dice:disabled { opacity:.55; cursor:not-allowed; border-style:solid; }
  .dice.rolling { animation:wiggle .4s; }
  @keyframes wiggle { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-4deg)} 75%{transform:rotate(4deg)} }
  .lastbtn { margin-top:10px; width:100%; padding:11px; border:1.5px solid var(--brand2); background:#fff7ef; color:var(--brand2); border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .lastbtn:active { transform:scale(.98); }
  .cancelpick { margin-top:6px; width:100%; padding:8px; border:none; background:transparent; color:var(--muted); font-size:13px; cursor:pointer; font-family:inherit; text-decoration:underline; }
  .cancelpick:active { color:var(--brand); }
  .submit { margin-top:16px; width:100%; padding:15px; border:none; border-radius:14px; background:var(--brand); color:#fff; font-size:17px; font-weight:800; letter-spacing:2px; cursor:pointer; font-family:inherit; }
  .submit:active { transform:scale(.98); }
  .submit:disabled { opacity:.45; }
  .warn { background:#fff6e6; border:1px solid #f0d79a; color:#8a6312; font-size:12px; border-radius:10px; padding:8px 12px; margin-top:10px; line-height:1.6; }
  .mini { margin-left:auto; border:1px solid var(--brand); background:#fff; color:var(--brand); border-radius:8px; padding:4px 12px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
  .groupbanner { background:#eef6ee; border:1px solid #bcd9bc; color:#2f6b3a; border-radius:12px; padding:10px 12px; font-size:13px; line-height:1.6; margin-bottom:8px; }
  .leaderitems { display:grid; grid-template-columns:1fr 1fr; gap:6px; max-height:220px; overflow:auto; padding:2px; }
  .leaderitems label { display:flex; align-items:center; gap:6px; font-size:13px; padding:7px 8px; border:1px solid var(--line); border-radius:9px; cursor:pointer; }
  .leaderitems input { width:16px; height:16px; accent-color:var(--brand); }
  input[type=number] { width:100%; padding:12px; border:1px solid var(--line); border-radius:12px; font-size:16px; outline:none; font-family:inherit; }
  .subnote { font-size:12px; color:#2f6b3a; font-weight:700; }
  .itemimg { width:100%; height:64px; object-fit:cover; border-radius:8px; margin-bottom:6px; display:block; }
  .customrow { display:flex; gap:6px; align-items:center; margin-bottom:8px; }
  .customrow input { width:auto; min-width:0; }
  .customrow .cn { flex:2; }
  .customrow .cp { flex:1; max-width:90px; }
  .customrow .ph { width:46px; height:46px; border:1px dashed var(--line); border-radius:8px; cursor:pointer; background:#faf5ee; flex:none; display:flex; align-items:center; justify-content:center; font-size:18px; overflow:hidden; }
  .customrow .ph img { width:100%; height:100%; object-fit:cover; }
  .customrow .rm { border:none; background:#f6ece1; color:#c0563f; border-radius:8px; width:34px; height:34px; font-size:16px; cursor:pointer; flex:none; }
  .order { display:flex; align-items:flex-start; gap:10px; padding:12px 0; border-bottom:1px dashed var(--line); }
  .order:last-child { border-bottom:none; }
  .order .who { font-weight:800; min-width:60px; }
  .order .what { flex:1; font-size:14px; line-height:1.5; }
  .order .what .shoptag { display:inline-block; font-size:11px; background:#efe6d8; color:var(--brand); border-radius:6px; padding:1px 6px; margin-right:5px; }
  .order .what .opt { color:var(--muted); font-size:12px; }
  .order .pr { font-weight:800; color:var(--brand); white-space:nowrap; }
  .order .del { border:none; background:#f6ece1; color:#c0563f; border-radius:8px; width:28px; height:28px; font-size:16px; cursor:pointer; flex:none; }
  .empty { color:var(--muted); text-align:center; padding:18px 0; font-size:14px; }
  .payrow { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px dashed var(--line); }
  .payrow:last-child { border-bottom:none; }
  .payrow .pn { flex:1; font-weight:700; }
  .payrow .pn small { color:var(--muted); font-weight:400; font-size:12px; }
  .payrow .pa { font-weight:800; color:var(--brand); white-space:nowrap; }
  .payrow.done .pn, .payrow.done .pa { opacity:.5; text-decoration:line-through; }
  .payrow label { display:flex; align-items:center; gap:5px; font-size:13px; color:#2f6b3a; font-weight:700; cursor:pointer; white-space:nowrap; }
  .payrow label input { width:18px; height:18px; accent-color:#2f6b3a; }
  .tally { display:flex; justify-content:space-around; text-align:center; margin-bottom:6px; }
  .tally .n { font-size:26px; font-weight:900; color:var(--brand); }
  .tally .t { font-size:12px; color:var(--muted); }
  .shoptally { border-top:1px solid var(--line); padding-top:10px; margin-top:6px; }
  .shoptally .row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; font-size:14px; }
  .copybtn { border:1.5px solid var(--brand); background:#fff; color:var(--brand); border-radius:10px; padding:6px 12px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
  footer { text-align:center; color:var(--muted); font-size:11px; margin-top:18px; line-height:1.7; }
  .toast { position:fixed; left:50%; bottom:22px; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px; font-size:14px; opacity:0; transition:.25s; pointer-events:none; z-index:50; max-width:90vw; text-align:center; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🍱 訂餐小幫手</h1>
    <div class="sub" id="sub">今日批次・載入中…</div>
  </header>

  <!-- 今日開的團・分享連結（在最上面）-->
  <div class="card" id="teamsCard" style="display:none">
    <h2>🔗 今日開的團（複製連結分享給群組）</h2>
    <div id="leaderTeams"></div>
  </div>

  <div class="card">
    <div id="teamPickerWrap" style="display:none">
      <label class="field">選擇要訂哪一團</label>
      <div class="chips" id="teamPicker"></div>
    </div>
    <div id="notOpen" class="notopen" style="display:none">🔒 目前尚未開團<br><span>請等團主在最下方開團後再點餐</span></div>
    <div id="closedMsg" class="notopen" style="display:none">✅ 本團已結單<br><span>團主已截止點餐，要加點請洽團主</span></div>
    <div id="orderBody">
      <div class="groupbanner" id="groupBanner" style="display:none"></div>
      <p class="lead">填名字 → 選餐點 → 按送出，大家即時看到 👇</p>
      <label class="field">你的名字</label>
      <input type="text" id="person" placeholder="輸入姓名（會記住）" autocomplete="off" />
      <button class="lastbtn" id="lastBtn" style="display:none">↩ 跟上次一樣（一鍵帶入）</button>

      <div id="shopArea" style="display:none">
        <div class="chips shopchips" id="shops"></div>
      </div>

      <label class="field">品項</label>
      <div class="items" id="items"></div>
      <button class="dice" id="dice">🎲 拿不定主意？幫我骰（剩 2 次）</button>
      <button class="cancelpick" id="cancelpick">↩ 取消重選（清空目前選擇）</button>

      <div id="drinkOpts">
        <label class="field">容量</label>
        <div class="chips" id="sizes"></div>

        <label class="field">甜度</label>
        <div class="chips" id="sugars"></div>

        <label class="field">冰塊</label>
        <div class="chips" id="ices"></div>

        <label class="field">加料（可複選，每項加價）</label>
        <div class="chips" id="toppings"></div>
      </div>

      <label class="field">備註（選填）</label>
      <input type="text" id="topping" placeholder="例如：換燕麥奶、少冰一點…" autocomplete="off" />

      <button class="submit" id="submit" disabled>請先選品項</button>
    </div>
  </div>

  <div class="card">
    <h2>📋 今日訂單 <span id="cupTag" style="font-size:13px;color:var(--muted);font-weight:400;"></span></h2>
    <div id="list"><div class="empty">還沒有人訂，當第一個吧！</div></div>
  </div>

  <div class="card">
    <h2>📊 統計（給訂購人）</h2>
    <div class="tally">
      <div><div class="n" id="totCups">0</div><div class="t">總杯數</div></div>
      <div><div class="n" id="totMoney">$0</div><div class="t">總金額</div></div>
      <div><div class="n" id="totPeople">0</div><div class="t">訂購人數</div></div>
    </div>
    <div id="subsidyTally" class="groupbanner" style="display:none;text-align:center"></div>
    <div id="shopTally"></div>
  </div>

  <div class="card" id="payCard" style="display:none">
    <h2>💰 收錢清單（團主對帳） <span id="payTag" style="font-size:13px;color:var(--muted);font-weight:400;"></span></h2>
    <p class="muted-note">勾「已收」記錄誰付了。金額為扣補助後的自付額。</p>
    <div id="payList"></div>
    <div id="paySummary" class="groupbanner" style="display:none;text-align:center;margin-top:8px"></div>
  </div>

  <!-- 團主開團（放最下面，一般人不用碰）-->
  <div class="card" id="leaderCard">
    <h2>🧑‍💼 團主開團 / 模式設定 <button class="mini" id="leaderToggle">展開</button></h2>
    <p class="muted-note">一般人只要在上面點餐即可。團主才需要這裡：限定店家、自訂菜單、設補助。</p>
    <div id="leaderPanel" style="display:none">
      <label class="field">開新團 — 選模式</label>
      <div class="chips" id="modeChips">
        <button class="chip" data-mode="group">限定店家（從 7 間飲料店選一間）</button>
        <button class="chip" data-mode="custom">自訂菜單（訂任何餐點/便當）</button>
      </div>
      <div id="groupSettings" style="display:none">
        <label class="field">指定店家</label>
        <div class="chips shopchips" id="leaderShops"></div>
        <label class="field">開放品項（不勾＝全部開放）</label>
        <div class="leaderitems" id="leaderItems"></div>
      </div>
      <div id="customSettings" style="display:none">
        <label class="field">這團的名稱（例如：今日便當、下午茶）</label>
        <input type="text" id="customTitle" placeholder="輸入團名" autocomplete="off" />
        <label class="field">自訂品項（名稱＋價格，可上傳照片）</label>
        <div id="customRows"></div>
        <button class="mini" id="addCustomRow" style="margin:8px 0 0">＋ 新增一項</button>
      </div>
      <div id="subsidyWrap" style="display:none">
        <label class="field">每杯/每份補助上限（公司付，超過自付；0＝不補助）</label>
        <input type="number" id="subsidyInput" min="0" placeholder="例如 50" />
      </div>
      <button class="submit" id="saveSession" style="margin-top:14px">＋ 開這團</button>
    </div>
  </div>

  <footer>
    資料即時同步，所有人看到同一張單。
  </footer>
</div>
<div class="toast" id="toast"></div>

const SUGARS = ['正常','少糖','半糖','微糖','無糖'];
const ICES   = ['正常冰','少冰','微冰','去冰','熱'];
const SIZES  = [['中杯','m'],['大杯','l']];
// 加料（每項加價，價格可調）
const TOPPINGS = [
  {name:'珍珠', price:10}, {name:'波霸', price:10}, {name:'椰果', price:10},
  {name:'布丁', price:10}, {name:'仙草凍', price:10}, {name:'燕麥', price:10},
];

const BATCH = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'})).toLocaleDateString('en-CA');
document.getElementById('sub').textContent = `今日批次　${BATCH}`;

const sel = { shop:SHOPS[0].id, item:null, sizeKey:'m', sugar:'半糖', ice:'少冰', toppings:new Set() };
let sessions = [];     // 今日所有團
let session = null;    // 目前選的團（active）
const TEAM_ID = new URLSearchParams(location.search).get('team');  // 一團一網址：?team=<id>
const teamLink = id => location.origin + location.pathname + '?team=' + id;
const $ = id => document.getElementById(id);
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1900); }
const shopOf = id => SHOPS.find(s=>s.id===id);
// 「跟上次一樣」依「人＋這一間店/這份菜單」分開記，避免不同店同名飲料搞混
const sessionKey = () => !session ? '' : (session.mode==='custom' ? 'c:'+(session.title||'自訂菜單') : 's:'+session.shop);
const lastKey = name => 'drink_last_'+name+'|'+sessionKey();
// 目前可選的菜單（依目前選的團）
function availableMenu(){
  if(!session) return [];
  if(session.mode==='custom'){
    return (session.custom_items||[]).map(c=>({name:c.name, m:c.price, l:c.price, photo:c.photo||null, single:true}));
  }
  let menu = shopOf(sel.shop).menu;
  if(session.mode==='group' && (session.allowed_items||[]).length>0){
    menu = menu.filter(d=>session.allowed_items.includes(d.name));
  }
  return menu;
}

$('person').value = localStorage.getItem('drink_person') || '';
$('person').addEventListener('input', e => { localStorage.setItem('drink_person', e.target.value.trim()); updateSubmit(); updateDice(); updateLastBtn(); });

// 店家 chips
const shopsEl = $('shops');
function renderShops(){
  shopsEl.innerHTML='';
  SHOPS.forEach(s => {
    const c = document.createElement('button'); c.className='chip'+(s.id===sel.shop?' on':''); c.textContent=s.name;
    c.onclick = () => { sel.shop=s.id; sel.item=null; shopsEl.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on',x===c)); buildItems(); updateSubmit(); };
    shopsEl.appendChild(c);
  });
}
renderShops();

// 品項（依選定店家；團主開團且有限定品項時只顯示開放的）
function buildItems(){
  const itemsEl = $('items'); itemsEl.innerHTML='';
  availableMenu().forEach(d => {
    const b = document.createElement('button'); b.className='item'; b.dataset.name=d.name;
    const subsidy = session ? (session.subsidy||0) : 0;
    const priceTxt = d.single ? `$${d.m}` : `中 $${d.m}・大 $${d.l}`;
    const sub = subsidy>0 ? `<div class="subnote">自付約 $${Math.max(0,d.m-subsidy)}起</div>` : '';
    const img = d.photo ? `<img src="${d.photo}" class="itemimg" alt="">` : '';
    b.innerHTML = `${img}<div class="nm">${d.name}</div><div class="pr">${priceTxt}</div>${sub}`;
    b.onclick = () => { sel.item=d.name; itemsEl.querySelectorAll('.item').forEach(x=>x.classList.toggle('on',x===b)); updateSubmit(); };
    itemsEl.appendChild(b);
  });
}
buildItems();

function buildChips(elId, list, getVal, getLabel, initVal, onPick){
  const el=$(elId);
  list.forEach(v=>{ const val=getVal(v); const c=document.createElement('button'); c.className='chip'+(val===initVal?' on':''); c.textContent=getLabel(v); c.dataset.val=String(val);
    c.onclick=()=>{ onPick(val); el.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on',x===c)); updateSubmit(); }; el.appendChild(c); });
}
function pickChip(elId, val){ $(elId).querySelectorAll('.chip').forEach(x=>x.classList.toggle('on', x.dataset.val===String(val))); }
function pickItem(name){ $('items').querySelectorAll('.item').forEach(x=>x.classList.toggle('on', x.dataset.name===name)); }
buildChips('sizes', SIZES, v=>v[1], v=>v[0], 'm', v=>sel.sizeKey=v);
buildChips('sugars', SUGARS, v=>v, v=>v, '半糖', v=>sel.sugar=v);
buildChips('ices', ICES, v=>v, v=>v, '少冰', v=>sel.ice=v);

// 加料 chips（可複選，每項加價）
function buildToppings(){
  const el=$('toppings'); el.innerHTML='';
  TOPPINGS.forEach(t=>{
    const c=document.createElement('button'); c.className='chip'+(sel.toppings.has(t.name)?' on':'');
    c.textContent=`${t.name} +$${t.price}`;
    c.onclick=()=>{ if(sel.toppings.has(t.name)) sel.toppings.delete(t.name); else sel.toppings.add(t.name);
      c.classList.toggle('on', sel.toppings.has(t.name)); updateSubmit(); };
    el.appendChild(c);
  });
}
buildToppings();
function toppingCost(){ return [...sel.toppings].reduce((s,n)=>{ const t=TOPPINGS.find(x=>x.name===n); return s+(t?t.price:0); },0); }

function priceOf(){ if(!sel.item) return 0; const d=availableMenu().find(x=>x.name===sel.item); const base=d?(sel.sizeKey==='l'?d.l:d.m):0; return base + toppingCost(); }
function selfPay(full, sub){ return sub>0 ? Math.max(0, full-sub) : full; }
function updateSubmit(){
  const ok = session && sel.item && $('person').value.trim();
  const btn=$('submit'); btn.disabled=!ok;
  if(!$('person').value.trim()){ btn.textContent='請先填名字'; return; }
  if(!sel.item){ btn.textContent='請先選品項'; return; }
  const full=priceOf(), sub=session?(session.subsidy||0):0;
  btn.textContent = sub>0 ? `送出　自付 $${selfPay(full,sub)}（原價 $${full}）` : `送出　$${full}`;
}

$('submit').onclick = async () => {
  const person=$('person').value.trim(); if(!person||!sel.item||!session) return;
  $('submit').disabled=true;
  const isCustom = session.mode==='custom';
  const note=$('topping').value.trim();
  const toppingStr = isCustom ? (note||null)
    : ([...sel.toppings].join('+') + (note ? (sel.toppings.size?'・':'')+note : '')) || null;
  const row = { batch:BATCH,
    shop: isCustom ? (session.title||'自訂菜單') : session.shop,
    person, item:sel.item,
    size: isCustom ? null : SIZES.find(s=>s[1]===sel.sizeKey)[0],
    sugar: isCustom ? null : sel.sugar,
    ice: isCustom ? null : sel.ice,
    topping:toppingStr, price:priceOf(),
    subsidy: session.subsidy||0, session_id: session.id };
  const { error } = await sb.from('drink_orders').insert(row);
  if(error){ toast('送出失敗：'+error.message); updateSubmit(); return; }
  // 記住這個人在「這一間店」點的，下次同店可「跟上次一樣」
  localStorage.setItem(lastKey(person), JSON.stringify({
    item:sel.item, sizeKey:sel.sizeKey, sugar:sel.sugar, ice:sel.ice,
    toppings:[...sel.toppings], isCustom }));
  $('topping').value=''; sel.toppings.clear(); buildToppings(); toast('✓ 已送出！'); load(); updateLastBtn();
};

async function load(){
  let q = sb.from('drink_orders').select('*').eq('batch',BATCH);
  if(TEAM_ID) q = q.eq('session_id', TEAM_ID);     // 一團一網址：只看這團
  const { data, error } = await q.order('created_at',{ascending:true});
  if(!error) render(data||[]);
}

function render(rows){
  renderPay(rows);
  $('cupTag').textContent = rows.length ? `共 ${rows.length} 杯` : '';
  const list=$('list');
  if(rows.length===0){ list.innerHTML='<div class="empty">還沒有人訂，當第一個吧！</div>'; }
  else {
    list.innerHTML='';
    rows.forEach(r=>{
      const div=document.createElement('div'); div.className='order';
      const opts=[r.size,r.sugar,r.ice].filter(Boolean).join('・');
      const sub=r.subsidy||0;
      const self = selfPay(r.price||0, sub);
      const priceHtml = sub>0
        ? `<div class="pr">$${self}<br><span style="font-size:10px;color:var(--muted);font-weight:400">原$${r.price}</span></div>`
        : `<div class="pr">$${r.price}</div>`;
      div.innerHTML =
        `<div class="who">${r.person}</div>`+
        `<div class="what"><span class="shoptag">${r.shop||'?'}</span>${r.item}<br><span class="opt">${opts}${r.topping?'・'+r.topping:''}</span></div>`+
        priceHtml+`<button class="del" title="刪除">×</button>`;
      div.querySelector('.del').onclick = async ()=>{ if(!confirm(`刪除 ${r.person} 的 ${r.item}？`)) return; await sb.from('drink_orders').delete().eq('id',r.id); load(); };
      list.appendChild(div);
    });
  }
  // 統計
  const totFull=rows.reduce((s,r)=>s+(r.price||0),0);
  $('totCups').textContent=rows.length;
  $('totMoney').textContent='$'+totFull;
  $('totPeople').textContent=new Set(rows.map(r=>r.person)).size;
  // 補助統計
  const subBox=$('subsidyTally');
  const anySub = rows.some(r=>(r.subsidy||0)>0);
  if(anySub && rows.length>0){
    const totSelf=rows.reduce((s,r)=>s+selfPay(r.price||0, r.subsidy||0),0);
    subBox.style.display='';
    subBox.innerHTML=`公司補助合計 <b>$${totFull-totSelf}</b>　・　員工自付合計 <b>$${totSelf}</b>`;
  } else { subBox.style.display='none'; }

  // 依店家分組 + 複製給店家
  const st=$('shopTally'); st.innerHTML='';
  const byShop={};
  rows.forEach(r=>{ (byShop[r.shop]=byShop[r.shop]||[]).push(r); });
  if(rows.length===0){ st.innerHTML='<div class="empty" style="padding:8px 0;">尚無訂單</div>'; return; }
  Object.entries(byShop).forEach(([shop,list])=>{
    const cups=list.length, money=list.reduce((s,r)=>s+(r.price||0),0);
    const wrap=document.createElement('div'); wrap.className='shoptally';
    const head=document.createElement('div'); head.className='row';
    head.innerHTML=`<b>${shop}</b>　<span style="color:var(--muted)">${cups}杯・$${money}</span>`;
    const btn=document.createElement('button'); btn.className='copybtn'; btn.textContent='📋 複製給店家';
    btn.onclick=()=>copyForShop(shop,list);
    head.appendChild(btn); wrap.appendChild(head);
    st.appendChild(wrap);
  });
}

// 💰 收錢清單：依人加總自付額，可勾「已收」（整批標記該人所有訂單）
function renderPay(rows){
  const card=$('payCard'), listEl=$('payList'), sumEl=$('paySummary');
  if(rows.length===0){ card.style.display='none'; return; }
  card.style.display='';
  const byPerson={};
  rows.forEach(r=>{ (byPerson[r.person]=byPerson[r.person]||[]).push(r); });
  listEl.innerHTML='';
  let owed=0, got=0, unpaidPeople=0;
  Object.entries(byPerson).forEach(([person,list])=>{
    const amt=list.reduce((s,r)=>s+selfPay(r.price||0, r.subsidy||0),0);
    const allPaid=list.every(r=>r.paid);
    owed+=amt; if(allPaid) got+=amt; else if(amt>0) unpaidPeople++;
    const items=list.map(r=>r.item).join('、');
    const row=document.createElement('div'); row.className='payrow'+(allPaid?' done':'');
    row.innerHTML=`<div class="pn">${person} <small>${list.length>1?list.length+'杯・':''}${items}</small></div>`+
      `<div class="pa">$${amt}</div>`;
    const lab=document.createElement('label');
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=allPaid;
    cb.onchange=async()=>{ const ids=list.map(r=>r.id);
      const {error}=await sb.from('drink_orders').update({paid:cb.checked}).in('id',ids);
      if(error){ toast('更新失敗：'+error.message); cb.checked=!cb.checked; return; } load(); };
    lab.appendChild(cb); lab.appendChild(document.createTextNode('已收'));
    row.appendChild(lab); listEl.appendChild(row);
  });
  $('payTag').textContent=`應收 $${owed}`;
  if(unpaidPeople>0){ sumEl.style.display=''; sumEl.innerHTML=`已收 <b>$${got}</b>　・　還差 <b>$${owed-got}</b>（${unpaidPeople} 人未付）`; }
  else { sumEl.style.display=''; sumEl.innerHTML=`✅ 全部收齊　<b>$${owed}</b>`; }
}

// 把某店訂單彙整成可貼給店家的文字（按 品項+容量+甜度+冰塊 加總）
function copyForShop(shop, list){
  const agg={};
  list.forEach(r=>{ const key=`${r.item}｜${r.size}｜${r.sugar}｜${r.ice}${r.topping?'｜'+r.topping:''}`; agg[key]=(agg[key]||0)+1; });
  const lines=Object.entries(agg).map(([k,n])=>{ const p=k.split('｜'); return `${p[0]}（${p.slice(1).join(' ')}）×${n}`; });
  const cups=list.length, money=list.reduce((s,r)=>s+(r.price||0),0);
  const phone=(shopOf(SHOPS.find(s=>s.name===shop)?.id)||{}).phone;
  const text = `【${shop}】${BATCH} 訂單\n`+lines.join('\n')+`\n———\n共 ${cups} 杯，金額約 $${money}`+(phone?`\n店家電話：${phone}`:'');
  navigator.clipboard.writeText(text).then(()=>toast('✓ 已複製，可貼給店家'),()=>{ prompt('複製這段給店家：', text); });
}

// ── 🎲 幫我骰（每人限 2 次；可取消重選，但取消不退骰子次數）──
const diceKey = () => 'dice_'+BATCH+'_'+($('person').value.trim()||'_');
const diceUsedNow = () => parseInt(localStorage.getItem(diceKey()) || '0', 10);
function updateDice(){
  const b=$('dice'), name=$('person').value.trim();
  if(!name){ b.disabled=true; b.textContent='🎲 請先填名字'; return; }
  const left=2-diceUsedNow();
  if(left<=0){ b.disabled=true; b.textContent='🎲 你的 2 次骰完囉，自己選或維持目前'; }
  else { b.disabled=false; b.textContent=`🎲 拿不定主意？幫我骰（你還剩 ${left} 次）`; }
}
$('dice').onclick = () => {
  const name=$('person').value.trim();
  if(!name || diceUsedNow()>=2) return;
  const menu=availableMenu();
  if(menu.length===0){ toast('目前沒有可骰的品項'); return; }
  sel.item = menu[Math.floor(Math.random()*menu.length)].name;
  pickItem(sel.item);
  let detail='';
  if(session && session.mode!=='custom'){   // 餐點不骰容量/甜度/冰塊
    sel.sizeKey = SIZES[Math.floor(Math.random()*SIZES.length)][1];
    sel.sugar = SUGARS[Math.floor(Math.random()*SUGARS.length)];
    sel.ice = ICES[Math.floor(Math.random()*ICES.length)];
    pickChip('sizes',sel.sizeKey); pickChip('sugars',sel.sugar); pickChip('ices',sel.ice);
    detail=`（${SIZES.find(s=>s[1]===sel.sizeKey)[0]}・${sel.sugar}・${sel.ice}）`;
  }
  localStorage.setItem(diceKey(), diceUsedNow()+1);
  const b=$('dice'); b.classList.remove('rolling'); void b.offsetWidth; b.classList.add('rolling');
  toast(`🎲 骰到：${sel.item}${detail}`);
  updateDice(); updateSubmit();
};
// 取消重選：清空目前選擇（不退還骰子次數）
$('cancelpick').onclick = () => {
  sel.item=null; sel.sizeKey='m'; sel.sugar='半糖'; sel.ice='少冰'; sel.toppings.clear();
  pickItem(''); pickChip('sizes','m'); pickChip('sugars','半糖'); pickChip('ices','少冰'); buildToppings();
  $('topping').value='';
  updateSubmit(); toast('已清空，可自己重選');
};

// ── ↩ 跟上次一樣：帶入這個人上次點的（存在 localStorage）──
function updateLastBtn(){
  const b=$('lastBtn'); if(!b) return;
  const name=$('person').value.trim();
  if(!(name && session && !session.closed)){ b.style.display='none'; return; }
  let last; try{ last=JSON.parse(localStorage.getItem(lastKey(name))||'null'); }catch(e){ last=null; }
  if(last && last.item){ b.style.display=''; b.textContent=`↩ 跟上次一樣（${last.item}）`; }
  else { b.style.display='none'; }   // 這間店沒有你的上次紀錄就不顯示
}
$('lastBtn').onclick = () => {
  const name=$('person').value.trim();
  if(!name){ toast('請先填名字'); return; }
  let last; try{ last=JSON.parse(localStorage.getItem(lastKey(name))||'null'); }catch(e){ last=null; }
  if(!last){ toast('這間店找不到你上次的紀錄'); return; }
  if(!availableMenu().find(d=>d.name===last.item)){ toast(`上次點的「${last.item}」這團沒有，請手動選`); return; }
  sel.item=last.item; pickItem(sel.item);
  if(session && session.mode!=='custom'){
    sel.sizeKey = last.sizeKey==='l' ? 'l' : 'm';
    sel.sugar = SUGARS.includes(last.sugar) ? last.sugar : sel.sugar;
    sel.ice = ICES.includes(last.ice) ? last.ice : sel.ice;
    sel.toppings = new Set((last.toppings||[]).filter(n=>TOPPINGS.find(t=>t.name===n)));
    pickChip('sizes',sel.sizeKey); pickChip('sugars',sel.sugar); pickChip('ices',sel.ice); buildToppings();
  }
  updateSubmit(); toast('✓ 已帶入上次：'+last.item);
};

// ── 多團：載入 / 選團 / 套用 ──
function teamLabel(s){ return s.mode==='custom' ? (s.title||'自訂菜單') : s.shop; }
function renderTeamPicker(){
  const wrap=$('teamPickerWrap'), el=$('teamPicker');
  if(TEAM_ID || sessions.length===0){ wrap.style.display='none'; el.innerHTML=''; return; }  // 單團網址不顯示選團
  wrap.style.display=''; el.innerHTML='';
  sessions.forEach(s=>{
    const c=document.createElement('button'); c.className='chip'+(session&&s.id===session.id?' on':'');
    c.textContent=(s.mode==='custom'?'🍱 ':'🧋 ')+teamLabel(s)+(s.closed?' ✅已結單':'');
    c.onclick=()=>{ session=s; sel.item=null; el.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on',x===c)); applySession(); };
    el.appendChild(c);
  });
}
function applySession(){
  $('closedMsg').style.display='none';
  if(!session){
    $('orderBody').style.display='none'; $('notOpen').style.display=''; $('groupBanner').style.display='none';
    load(); return;
  }
  $('notOpen').style.display='none'; $('orderBody').style.display='';
  if(session.mode==='custom'){
    sel.item=null;
    $('shopArea').style.display='none'; $('drinkOpts').style.display='none';   // 餐點不用容量/甜度/冰塊
    const subTxt = session.subsidy>0 ? `　・　公司每份補助 $${session.subsidy}，超過自付` : '';
    $('groupBanner').style.display='';
    $('groupBanner').innerHTML = `🍱 <b>${session.title||'自訂菜單'}</b>${subTxt}`;
  } else {
    const sid = SHOPS.find(s=>s.name===session.shop)?.id;
    if(sid && sel.shop!==sid){ sel.shop=sid; sel.item=null; }
    $('shopArea').style.display='none'; $('drinkOpts').style.display='';
    const subTxt = session.subsidy>0 ? `　・　公司每杯補助 $${session.subsidy}，超過自付` : '';
    $('groupBanner').style.display='';
    $('groupBanner').innerHTML = `🧋 指定店家：<b>${session.shop}</b>${subTxt}`
      + ((session.allowed_items||[]).length>0 ? `<br>開放品項：${session.allowed_items.join('、')}` : '');
  }
  sel.toppings.clear(); buildToppings();
  renderShops(); buildItems(); updateSubmit(); updateLastBtn();
  if(session.closed){ $('orderBody').style.display='none'; $('closedMsg').style.display=''; }
  load();
}
async function loadSessions(){
  const { data } = await sb.from('drink_sessions').select('*').eq('batch',BATCH).order('created_at',{ascending:true});
  sessions = (data||[]).filter(s=>s.mode==='group'||s.mode==='custom').map(s=>({
    id:s.id, mode:s.mode, shop:s.shop, allowed_items:s.allowed_items||[], subsidy:s.subsidy||0, custom_items:s.custom_items||[], title:s.title||'', closed:!!s.closed
  }));
  if(TEAM_ID){
    // 一團一網址：鎖定該團、隱藏團主面板
    session = sessions.find(s=>s.id===TEAM_ID) || null;
    const lc=$('leaderCard'); if(lc) lc.style.display='none';
    if(session){ $('sub').textContent = `${teamLabel(session)}　${BATCH}`; }
    else { $('notOpen').innerHTML='🔒 這個團不存在或已關閉<br><span>請向團主索取最新連結</span>'; }
  } else {
    const keep = session && session.id;
    session = sessions.find(s=>s.id===keep) || sessions[0] || null;
  }
  renderTeamPicker(); renderLeaderTeams(); applySession();
}

// ── 團主面板（可開多個團）──
const leader = { mode:'group', shopName:SHOPS[0].name, allowed:new Set(), subsidy:0, title:'', custom:[] };
$('leaderToggle').onclick = ()=>{
  const p=$('leaderPanel'), show=p.style.display==='none';
  p.style.display=show?'':'none'; $('leaderToggle').textContent=show?'收合':'展開';
  if(show){ resetEditor(); renderLeaderTeams(); }
};
function refreshLeaderSections(){
  $('groupSettings').style.display = leader.mode==='group' ? '' : 'none';
  $('customSettings').style.display = leader.mode==='custom' ? '' : 'none';
  $('subsidyWrap').style.display = (leader.mode==='group'||leader.mode==='custom') ? '' : 'none';
}
// 今日已開的團清單（可關閉）
function renderLeaderTeams(){
  const el=$('leaderTeams'), card=$('teamsCard'); if(!el) return; el.innerHTML='';
  if(TEAM_ID || sessions.length===0){ if(card) card.style.display='none'; return; }   // 單團網址不顯示
  if(card) card.style.display='';
  const COPY_SVG='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  sessions.forEach(s=>{
    const url=teamLink(s.id);
    const row=document.createElement('div'); row.className='teamrow';
    const name=document.createElement('div'); name.className='name';
    name.innerHTML=`<span>${s.mode==='custom'?'🍱 ':'🧋 '}${teamLabel(s)}${s.closed?' <small style="color:#2f6b3a;font-weight:700">✅已結單</small>':''}</span>`;
    const btns=document.createElement('span'); btns.style.cssText='display:flex;gap:10px;align-items:center';
    const lock=document.createElement('button'); lock.className='close'; lock.style.color=s.closed?'#2f6b3a':'#a9743f';
    lock.textContent = s.closed ? '↺ 重新開單' : '🔒 結單';
    lock.onclick=async()=>{
      const {error}=await sb.from('drink_sessions').update({closed:!s.closed}).eq('id',s.id);
      if(error){ toast('失敗：'+error.message); return; }
      toast(s.closed?'已重新開單，可繼續點':'已結單，無法再點'); await loadSessions(); };
    const close=document.createElement('button'); close.className='close'; close.textContent='× 關閉';
    close.onclick=async()=>{ if(!confirm(`關閉「${teamLabel(s)}」這團？\n（已點的訂單會保留）`)) return;
      const {error}=await sb.from('drink_sessions').delete().eq('id',s.id);
      if(error){ toast('關閉失敗：'+error.message); return; }
      toast('已關閉這團'); await loadSessions(); };
    btns.appendChild(lock); btns.appendChild(close);
    name.appendChild(btns);
    const lr=document.createElement('div'); lr.className='linkrow';
    const u=document.createElement('div'); u.className='url'; u.textContent=url; u.title=url;
    const cp=document.createElement('button'); cp.className='copy'; cp.innerHTML=COPY_SVG; cp.title='複製連結';
    cp.onclick=()=>{ navigator.clipboard.writeText(url).then(()=>{ toast('✓ 已複製連結'); cp.classList.add('done'); setTimeout(()=>cp.classList.remove('done'),1200); },()=>prompt('複製連結：',url)); };
    lr.appendChild(u); lr.appendChild(cp);
    row.appendChild(name); row.appendChild(lr); el.appendChild(row);
  });
}
// 重置「開新團」編輯器
function resetEditor(){
  leader.mode='group'; leader.shopName=SHOPS[0].name; leader.allowed=new Set();
  leader.subsidy=0; leader.title=''; leader.custom=[];
  $('subsidyInput').value=''; $('customTitle').value='';
  $('modeChips').querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.mode===leader.mode));
  refreshLeaderSections();
  renderLeaderShops(); renderLeaderItems(); renderCustomRows();
}
$('modeChips').querySelectorAll('.chip').forEach(c=>{
  c.onclick=()=>{ leader.mode=c.dataset.mode; $('modeChips').querySelectorAll('.chip').forEach(x=>x.classList.toggle('on',x===c)); refreshLeaderSections(); };
});
function renderLeaderShops(){
  const el=$('leaderShops'); el.innerHTML='';
  SHOPS.forEach(s=>{ const c=document.createElement('button'); c.className='chip'+(s.name===leader.shopName?' on':''); c.textContent=s.name;
    c.onclick=()=>{ leader.shopName=s.name; leader.allowed=new Set(); el.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on',x===c)); renderLeaderItems(); };
    el.appendChild(c); });
}
function renderLeaderItems(){
  const el=$('leaderItems'); el.innerHTML='';
  const shop=SHOPS.find(s=>s.name===leader.shopName);
  (shop?shop.menu:[]).forEach(d=>{
    const lab=document.createElement('label');
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=leader.allowed.has(d.name);
    cb.onchange=()=>{ cb.checked?leader.allowed.add(d.name):leader.allowed.delete(d.name); };
    lab.appendChild(cb); lab.appendChild(document.createTextNode(' '+d.name)); el.appendChild(lab);
  });
}
// 自訂品項編輯
function renderCustomRows(){
  const el=$('customRows'); el.innerHTML='';
  leader.custom.forEach((it,idx)=>{
    const row=document.createElement('div'); row.className='customrow';
    const ph=document.createElement('label'); ph.className='ph'; ph.innerHTML = it.photo ? `<img src="${it.photo}">` : '📷';
    const file=document.createElement('input'); file.type='file'; file.accept='image/*'; file.style.display='none';
    file.onchange=()=>uploadCustomPhoto(idx, file.files[0]); ph.appendChild(file);
    const nm=document.createElement('input'); nm.type='text'; nm.className='cn'; nm.placeholder='品項名稱'; nm.value=it.name||'';
    nm.oninput=()=>{ leader.custom[idx].name=nm.value; };
    const pr=document.createElement('input'); pr.type='number'; pr.className='cp'; pr.min='0'; pr.placeholder='價格'; pr.value=it.price||'';
    pr.oninput=()=>{ leader.custom[idx].price=parseInt(pr.value||'0',10)||0; };
    const rm=document.createElement('button'); rm.className='rm'; rm.textContent='×';
    rm.onclick=()=>{ leader.custom.splice(idx,1); renderCustomRows(); };
    row.appendChild(ph); row.appendChild(nm); row.appendChild(pr); row.appendChild(rm);
    el.appendChild(row);
  });
}
$('addCustomRow').onclick=()=>{ leader.custom.push({name:'',price:0,photo:null}); renderCustomRows(); };
async function uploadCustomPhoto(idx, file){
  if(!file) return;
  toast('上傳照片中…');
  const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
  const path='items/'+Date.now()+'_'+Math.random().toString(36).slice(2,7)+'.'+ext;
  const { error } = await sb.storage.from('drink-photos').upload(path, file, { contentType:file.type });
  if(error){ toast('上傳失敗：'+error.message); return; }
  leader.custom[idx].photo = sb.storage.from('drink-photos').getPublicUrl(path).data.publicUrl;
  renderCustomRows(); toast('✓ 照片已上傳');
}
$('saveSession').onclick = async ()=>{
  const subsidy=Math.max(0, parseInt($('subsidyInput').value||'0',10)||0);
  let payload;
  if(leader.mode==='group'){
    payload={ batch:BATCH, mode:'group', shop:leader.shopName, allowed_items:[...leader.allowed], subsidy, custom_items:[], title:null };
  } else {
    const items=leader.custom.filter(c=>c.name&&c.name.trim()).map(c=>({name:c.name.trim(), price:c.price||0, photo:c.photo||null}));
    if(items.length===0){ toast('請至少新增一個有名稱的品項'); return; }
    payload={ batch:BATCH, mode:'custom', shop:null, allowed_items:[], subsidy, custom_items:items, title:($('customTitle').value.trim()||'自訂菜單') };
  }
  const { error } = await sb.from('drink_sessions').insert(payload);
  if(error){ toast('開團失敗：'+error.message); return; }
  toast('✓ 已開團！所有人畫面已更新');
  resetEditor();
  await loadSessions();
};

sb.channel('drink_orders_live').on('postgres_changes',{event:'*',schema:'public',table:'drink_orders'},()=>load()).subscribe();
sb.channel('drink_sessions_live').on('postgres_changes',{event:'*',schema:'public',table:'drink_sessions'},()=>loadSessions()).subscribe();
updateSubmit(); updateDice(); updateLastBtn(); loadSessions();

// ── LINE LIFF：在 LINE 內開啟時自動帶名字 ──
const LIFF_ID='2010389802-gPyOd3rI';
(async()=>{
  try{
    if(typeof liff==='undefined') return;          // SDK 沒載入（離線）→ 維持手動
    await liff.init({ liffId: LIFF_ID });
    if(liff.isLoggedIn()){
      const p = await liff.getProfile();
      if(p && p.displayName){
        $('person').value = p.displayName;
        localStorage.setItem('drink_person', p.displayName);
        updateSubmit(); updateDice(); updateLastBtn();
      }
    } else if(liff.isInClient()){
      liff.login();                                 // 在 LINE 內但未登入 → 登入
    }
    // 一般瀏覽器（非 LINE）：不強制登入，維持手動輸入
  }catch(e){ /* 初始化失敗就維持手動輸入 */ }
})();
</script>
