<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>員工訂飲料</title>
<style>
  :root { --brand:#7b4b2a; --brand2:#a9743f; --bg:#fbf6ef; --card:#fff; --line:#ece2d5; --ink:#3a2c1e; --muted:#9b8a76; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:"Microsoft JhengHei",system-ui,sans-serif; }
  .wrap { max-width:560px; margin:0 auto; padding:14px 14px 60px; }
  header { text-align:center; padding:14px 0 6px; }
  header h1 { margin:0; font-size:24px; letter-spacing:2px; }
  header .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px; margin-top:14px; box-shadow:0 2px 10px rgba(120,80,40,.05); }
  .card h2 { margin:0 0 12px; font-size:16px; letter-spacing:1px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  label.field { display:block; font-size:12px; color:var(--muted); margin:12px 0 6px; font-weight:700; letter-spacing:1px; }
  input[type=text] { width:100%; padding:12px; border:1px solid var(--line); border-radius:12px; font-size:16px; outline:none; font-family:inherit; }
  input[type=text]:focus { border-color:var(--brand2); }
  .chips { display:flex; flex-wrap:wrap; gap:8px; }
  .chip { padding:9px 14px; border-radius:999px; border:1.5px solid var(--line); background:#fff; font-size:14px; cursor:pointer; user-select:none; transition:.12s; font-family:inherit; color:var(--ink); }
  .chip.on { background:var(--brand); border-color:var(--brand); color:#fff; font-weight:700; }
  .shopchips .chip.on { background:var(--brand2); border-color:var(--brand2); }
  .items { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .item { padding:12px; border-radius:14px; border:1.5px solid var(--line); background:#fff; cursor:pointer; text-align:left; transition:.12s; font-family:inherit; }
  .item.on { border-color:var(--brand); background:#fbf1e7; }
  .item .nm { font-size:15px; font-weight:700; color:var(--ink); }
  .item .pr { font-size:12px; color:var(--muted); margin-top:3px; }
  .submit { margin-top:16px; width:100%; padding:15px; border:none; border-radius:14px; background:var(--brand); color:#fff; font-size:17px; font-weight:800; letter-spacing:2px; cursor:pointer; font-family:inherit; }
  .submit:active { transform:scale(.98); }
  .submit:disabled { opacity:.45; }
  .warn { background:#fff6e6; border:1px solid #f0d79a; color:#8a6312; font-size:12px; border-radius:10px; padding:8px 12px; margin-top:10px; line-height:1.6; }
  .order { display:flex; align-items:flex-start; gap:10px; padding:12px 0; border-bottom:1px dashed var(--line); }
  .order:last-child { border-bottom:none; }
  .order .who { font-weight:800; min-width:60px; }
  .order .what { flex:1; font-size:14px; line-height:1.5; }
  .order .what .shoptag { display:inline-block; font-size:11px; background:#efe6d8; color:var(--brand); border-radius:6px; padding:1px 6px; margin-right:5px; }
  .order .what .opt { color:var(--muted); font-size:12px; }
  .order .pr { font-weight:800; color:var(--brand); white-space:nowrap; }
  .order .del { border:none; background:#f6ece1; color:#c0563f; border-radius:8px; width:28px; height:28px; font-size:16px; cursor:pointer; flex:none; }
  .empty { color:var(--muted); text-align:center; padding:18px 0; font-size:14px; }
  .tally { display:flex; justify-content:space-around; text-align:center; margin-bottom:6px; }
  .tally .n { font-size:26px; font-weight:900; color:var(--brand); }
  .tally .t { font-size:12px; color:var(--muted); }
  .shoptally { border-top:1px solid var(--line); padding-top:10px; margin-top:6px; }
  .shoptally .row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; font-size:14px; }
  .copybtn { border:1.5px solid var(--brand); background:#fff; color:var(--brand); border-radius:10px; padding:6px 12px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
  footer { text-align:center; color:var(--muted); font-size:11px; margin-top:18px; line-height:1.7; }
  .toast { position:fixed; left:50%; bottom:22px; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px; font-size:14px; opacity:0; transition:.25s; pointer-events:none; z-index:50; max-width:90vw; text-align:center; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🧋 員工訂飲料</h1>
    <div class="sub" id="sub">今日批次・載入中…</div>
  </header>

  <div class="card">
    <h2>📝 我要訂</h2>
    <label class="field">你的名字</label>
    <input type="text" id="person" placeholder="輸入姓名（會記住）" autocomplete="off" />

    <label class="field">選店家</label>
    <div class="chips shopchips" id="shops"></div>

    <label class="field">品項</label>
    <div class="items" id="items"></div>

    <label class="field">容量</label>
    <div class="chips" id="sizes"></div>

    <label class="field">甜度</label>
    <div class="chips" id="sugars"></div>

    <label class="field">冰塊</label>
    <div class="chips" id="ices"></div>

    <label class="field">加料 / 備註（選填）</label>
    <input type="text" id="topping" placeholder="例如：加珍珠、換燕麥奶…" autocomplete="off" />

    <button class="submit" id="submit" disabled>請先選店家與品項</button>
    <div class="warn">菜單依岡山各店實際照片建立。得正、五十嵐已附電話；較密的菜單(Mr.Wish/金茶伍/水巷/樂法)請順手核對價格，要補品項或改價跟 Claude 說即可。</div>
  </div>

  <div class="card">
    <h2>📋 今日訂單 <span id="cupTag" style="font-size:13px;color:var(--muted);font-weight:400;"></span></h2>
    <div id="list"><div class="empty">還沒有人訂，當第一個吧！</div></div>
  </div>

  <div class="card">
    <h2>📊 統計（給訂購人）</h2>
    <div class="tally">
      <div><div class="n" id="totCups">0</div><div class="t">總杯數</div></div>
      <div><div class="n" id="totMoney">$0</div><div class="t">總金額</div></div>
      <div><div class="n" id="totPeople">0</div><div class="t">訂購人數</div></div>
    </div>
    <div id="shopTally"></div>
  </div>

  <footer>
    多店家版・資料即時同步，所有人看到同一張單。<br>
    要改菜單價格或填電話，跟 Claude 說或編輯 index.html 的 SHOPS。
  </footer>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://hhbgdfnnnfemqpzrjhnh.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhoYmdkZm5ubmZlbXFwenJqaG5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMjY1MDQsImV4cCI6MjA5MDYwMjUwNH0._eWQqiLd1baVS_bAdn0i5xa_gWOPby37lUTB17d1aHU';
const sb = supabase.createClient(SUPA_URL, SUPA_ANON);

// ── 店家與菜單（依岡山各店實際菜單照片建立，2024）──
const SHOPS = [
  { id:'dejeng', name:'得正', phone:'07-6225168', menu:[
    {name:'紅茶', m:25, l:30}, {name:'綠茶', m:25, l:30},
    {name:'青烏龍', m:30, l:35}, {name:'焙烏龍', m:30, l:35},
    {name:'奶茶', m:40, l:45}, {name:'焙烏龍奶茶', m:40, l:45},
    {name:'黃金珍珠奶茶', m:50, l:55}, {name:'麻吉奶茶', m:50, l:55},
    {name:'檸檬青烏龍', m:45, l:55}, {name:'甘蔗青烏龍', m:45, l:55},
    {name:'葡萄柚青烏龍', m:50, l:55}, {name:'優酪青烏龍', m:50, l:55},
    {name:'焙烏龍鮮奶', m:50, l:60}, {name:'青烏龍鮮奶', m:50, l:60},
    {name:'芝士奶蓋紅茶', m:50, l:55}, {name:'芝士奶蓋焙烏龍', m:55, l:60},
  ]},
  { id:'mrwish', name:'Mr.Wish', phone:'', menu:[
    {name:'珍珠紅茶', m:40, l:55}, {name:'翡翠檸檬', m:60, l:70},
    {name:'葡萄柚翡翠', m:65, l:75}, {name:'黃金鳳梨翡翠', m:65, l:75},
    {name:'芒果鮮果茶', m:80, l:90}, {name:'草莓系列(季節)', m:80, l:90},
    {name:'鮮柚青茶', m:60, l:70}, {name:'多多綠', m:55, l:65},
  ]},
  { id:'jincha', name:'金茶伍', phone:'', menu:[
    {name:'珍珠厚奶', m:50, l:60}, {name:'蔗香青茶', m:30, l:40},
    {name:'Q粿紅茶', m:45, l:55}, {name:'高山烏龍', m:35, l:45},
    {name:'黃金蕎麥茶', m:40, l:50}, {name:'荔枝小茉莉', m:55, l:65},
    {name:'日光金萱', m:35, l:45}, {name:'柳丁Q粿果粒茶', m:60, l:70},
  ]},
  { id:'chanung', name:'水巷茶弄', phone:'', menu:[
    {name:'寒天玉小紫蘇', m:65, l:90}, {name:'膠原蛋白小紫蘇', m:65, l:90},
    {name:'桔香小紫蘇', m:55, l:85}, {name:'茉莉蜜紅茶', m:30, l:55},
    {name:'茉莉綠茶', m:30, l:55}, {name:'冬瓜烏龍', m:35, l:65},
    {name:'金鑽鳳梨綠', m:60, l:60}, {name:'滿分水果茶', m:65, l:65},
    {name:'紅茶拿鐵', m:60, l:90}, {name:'珍珠紅茶拿鐵', m:60, l:90},
  ]},
  { id:'50lan', name:'五十嵐', phone:'07-6242333', menu:[
    {name:'茉莉綠茶', m:25, l:30}, {name:'阿薩姆紅茶', m:25, l:30},
    {name:'四季春青茶', m:25, l:30}, {name:'波霸紅', m:25, l:35},
    {name:'檸檬綠', m:40, l:50}, {name:'梅の綠', m:40, l:50},
    {name:'8冰綠', m:40, l:50}, {name:'多多綠', m:50, l:60},
    {name:'柚子茶', m:40, l:50}, {name:'奶茶', m:40, l:55},
    {name:'珍珠奶茶', m:50, l:55}, {name:'波霸奶茶', m:50, l:55},
    {name:'燕麥奶茶', m:55, l:60}, {name:'阿華田', m:45, l:60},
    {name:'紅茶拿鐵', m:50, l:65}, {name:'冰淇淋紅茶', m:50, l:55},
  ]},
  { id:'lefa', name:'樂法', phone:'', menu:[
    {name:'蘋果鮮柚', m:70, l:90}, {name:'蘋果鮮綠', m:70, l:90},
    {name:'蘋果柳橙檸檬', m:75, l:95}, {name:'草莓奶霜(NEW)', m:90, l:90},
    {name:'草莓多多', m:75, l:75}, {name:'芒果系列', m:65, l:80},
    {name:'蜜桃系列', m:70, l:90}, {name:'多多綠', m:50, l:60},
  ]},
  { id:'guiji', name:'龜記', phone:'', menu:[
    {name:'極品紅茶', m:35, l:35}, {name:'翡翠綠茶', m:35, l:35},
    {name:'三十三紅茶', m:40, l:40}, {name:'碎銀普洱茶', m:40, l:40},
    {name:'花沫烏龍', m:40, l:40}, {name:'豆漿紅茶', m:45, l:45},
    {name:'冬瓜茶王', m:45, l:45}, {name:'玉山雷夢', m:50, l:50},
    {name:'楊桃雷夢', m:50, l:50}, {name:'極品奶茶', m:50, l:50},
    {name:'翡翠奶茶', m:50, l:50}, {name:'三王奶茶', m:55, l:55},
    {name:'極品鮮乳茶', m:65, l:65}, {name:'冬瓜鮮乳', m:65, l:65},
    {name:'茶王鮮乳', m:69, l:69}, {name:'巧克鮮乳茶', m:69, l:69},
  ]},
];
const SUGARS = ['正常','少糖','半糖','微糖','無糖'];
const ICES   = ['正常冰','少冰','微冰','去冰','熱'];
const SIZES  = [['中杯','m'],['大杯','l']];

const BATCH = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Taipei'})).toLocaleDateString('en-CA');
document.getElementById('sub').textContent = `今日批次　${BATCH}`;

const sel = { shop:SHOPS[0].id, item:null, sizeKey:'m', sugar:'半糖', ice:'少冰' };
const $ = id => document.getElementById(id);
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1900); }
const shopOf = id => SHOPS.find(s=>s.id===id);

$('person').value = localStorage.getItem('drink_person') || '';
$('person').addEventListener('input', e => { localStorage.setItem('drink_person', e.target.value.trim()); updateSubmit(); });

// 店家 chips
const shopsEl = $('shops');
SHOPS.forEach(s => {
  const c = document.createElement('button'); c.className='chip'+(s.id===sel.shop?' on':''); c.textContent=s.name;
  c.onclick = () => { sel.shop=s.id; sel.item=null; shopsEl.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on',x===c)); buildItems(); updateSubmit(); };
  shopsEl.appendChild(c);
});

// 品項（依選定店家）
function buildItems(){
  const itemsEl = $('items'); itemsEl.innerHTML='';
  shopOf(sel.shop).menu.forEach(d => {
    const b = document.createElement('button'); b.className='item'; b.dataset.name=d.name;
    b.innerHTML = `<div class="nm">${d.name}</div><div class="pr">中 $${d.m}・大 $${d.l}</div>`;
    b.onclick = () => { sel.item=d.name; itemsEl.querySelectorAll('.item').forEach(x=>x.classList.toggle('on',x===b)); updateSubmit(); };
    itemsEl.appendChild(b);
  });
}
buildItems();

function buildChips(elId, list, getVal, getLabel, initVal, onPick){
  const el=$(elId);
  list.forEach(v=>{ const c=document.createElement('button'); c.className='chip'+(getVal(v)===initVal?' on':''); c.textContent=getLabel(v);
    c.onclick=()=>{ onPick(getVal(v)); el.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on',x===c)); updateSubmit(); }; el.appendChild(c); });
}
buildChips('sizes', SIZES, v=>v[1], v=>v[0], 'm', v=>sel.sizeKey=v);
buildChips('sugars', SUGARS, v=>v, v=>v, '半糖', v=>sel.sugar=v);
buildChips('ices', ICES, v=>v, v=>v, '少冰', v=>sel.ice=v);

function priceOf(){ if(!sel.item) return 0; const d=shopOf(sel.shop).menu.find(x=>x.name===sel.item); return sel.sizeKey==='l'?d.l:d.m; }
function updateSubmit(){
  const ok = sel.item && $('person').value.trim();
  const btn=$('submit'); btn.disabled=!ok;
  btn.textContent = !$('person').value.trim() ? '請先填名字' : !sel.item ? '請先選品項' : `送出　$${priceOf()}`;
}

$('submit').onclick = async () => {
  const person=$('person').value.trim(); if(!person||!sel.item) return;
  $('submit').disabled=true;
  const row = { batch:BATCH, shop:shopOf(sel.shop).name, person, item:sel.item,
    size:SIZES.find(s=>s[1]===sel.sizeKey)[0], sugar:sel.sugar, ice:sel.ice,
    topping:$('topping').value.trim()||null, price:priceOf() };
  const { error } = await sb.from('drink_orders').insert(row);
  if(error){ toast('送出失敗：'+error.message); updateSubmit(); return; }
  $('topping').value=''; toast('✓ 已送出！'); load();
};

async function load(){
  const { data, error } = await sb.from('drink_orders').select('*').eq('batch',BATCH).order('created_at',{ascending:true});
  if(!error) render(data||[]);
}

function render(rows){
  $('cupTag').textContent = rows.length ? `共 ${rows.length} 杯` : '';
  const list=$('list');
  if(rows.length===0){ list.innerHTML='<div class="empty">還沒有人訂，當第一個吧！</div>'; }
  else {
    list.innerHTML='';
    rows.forEach(r=>{
      const div=document.createElement('div'); div.className='order';
      const opts=[r.size,r.sugar,r.ice].filter(Boolean).join('・');
      div.innerHTML =
        `<div class="who">${r.person}</div>`+
        `<div class="what"><span class="shoptag">${r.shop||'?'}</span>${r.item}<br><span class="opt">${opts}${r.topping?'・'+r.topping:''}</span></div>`+
        `<div class="pr">$${r.price}</div><button class="del" title="刪除">×</button>`;
      div.querySelector('.del').onclick = async ()=>{ if(!confirm(`刪除 ${r.person} 的 ${r.item}？`)) return; await sb.from('drink_orders').delete().eq('id',r.id); load(); };
      list.appendChild(div);
    });
  }
  // 統計
  $('totCups').textContent=rows.length;
  $('totMoney').textContent='$'+rows.reduce((s,r)=>s+(r.price||0),0);
  $('totPeople').textContent=new Set(rows.map(r=>r.person)).size;

  // 依店家分組 + 複製給店家
  const st=$('shopTally'); st.innerHTML='';
  const byShop={};
  rows.forEach(r=>{ (byShop[r.shop]=byShop[r.shop]||[]).push(r); });
  if(rows.length===0){ st.innerHTML='<div class="empty" style="padding:8px 0;">尚無訂單</div>'; return; }
  Object.entries(byShop).forEach(([shop,list])=>{
    const cups=list.length, money=list.reduce((s,r)=>s+(r.price||0),0);
    const wrap=document.createElement('div'); wrap.className='shoptally';
    const head=document.createElement('div'); head.className='row';
    head.innerHTML=`<b>${shop}</b>　<span style="color:var(--muted)">${cups}杯・$${money}</span>`;
    const btn=document.createElement('button'); btn.className='copybtn'; btn.textContent='📋 複製給店家';
    btn.onclick=()=>copyForShop(shop,list);
    head.appendChild(btn); wrap.appendChild(head);
    st.appendChild(wrap);
  });
}

// 把某店訂單彙整成可貼給店家的文字（按 品項+容量+甜度+冰塊 加總）
function copyForShop(shop, list){
  const agg={};
  list.forEach(r=>{ const key=`${r.item}｜${r.size}｜${r.sugar}｜${r.ice}${r.topping?'｜'+r.topping:''}`; agg[key]=(agg[key]||0)+1; });
  const lines=Object.entries(agg).map(([k,n])=>{ const p=k.split('｜'); return `${p[0]}（${p.slice(1).join(' ')}）×${n}`; });
  const cups=list.length, money=list.reduce((s,r)=>s+(r.price||0),0);
  const phone=(shopOf(SHOPS.find(s=>s.name===shop)?.id)||{}).phone;
  const text = `【${shop}】${BATCH} 訂單\n`+lines.join('\n')+`\n———\n共 ${cups} 杯，金額約 $${money}`+(phone?`\n店家電話：${phone}`:'');
  navigator.clipboard.writeText(text).then(()=>toast('✓ 已複製，可貼給店家'),()=>{ prompt('複製這段給店家：', text); });
}

sb.channel('drink_orders_live').on('postgres_changes',{event:'*',schema:'public',table:'drink_orders'},()=>load()).subscribe();
load(); updateSubmit();
</script>
</body>
</html>
